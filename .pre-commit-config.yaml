#############################################################################################
# pre-commit — language-agnostic hooks for this NON-python API repo.                         #
# This repo ships .proto sources + generated API documentation; there is no python code, so  #
# python-only hooks (mirrors-mypy, autopep8, flake8, check-ast, name-tests-test,             #
# requirements-txt-fixer, pretty-format-json) are intentionally NOT included.                #
#                                                                                            #
# see https://pre-commit.com/#intro for an introduction to pre-commit                        #
#############################################################################################

# Never touch generated / vendored code:
#   docs/        -> generated API documentation (index.html / index.md / style.css),
#                   produced by the "Generate API Documentation" CI workflow.
#   googleapis/  -> vendored upstream Google API protos (used only as import paths).
exclude: '^(docs/|googleapis/)'

fail_fast: false
# "fail_fast: false" means pre-commit continues to run hooks after the first failure

repos:

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.23.0
    hooks:
      - id: markdownlint-cli2

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: [ maxkb=1024 ]
      - id: check-json          # validate (does NOT reformat) json/package.json
      - id: check-yaml
      - id: check-xml
      - id: check-merge-conflict
      - id: check-symlinks
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/milin/giticket
    rev: '1.92'
    hooks:
      - id: giticket
        args: [ '--regex=(?:(?:feature|bugfix|support|hotfix)/)?(OND[0-9]{3}-[0-9]{1,5})[_-][\w-]+',
                '--format=[{ticket}] {commit_msg}',
                '--mode=regex_match' ]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [ commit-msg ]
